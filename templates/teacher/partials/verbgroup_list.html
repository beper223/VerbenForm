{% load i18n %}
<div class="card border-0 shadow-sm overflow-hidden" id="verbgroup-list-container">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">{% trans "Titel des Wortschatzes" %}</th>
                    <th>{% trans "Kurs" %}</th>
                    <th class="text-center">{% trans "Verben" %}</th>
                    <th class="text-end pe-4">{% trans "Aktion" %}</th>
                </tr>
            </thead>
            <tbody>
                {% for group in verb_groups %}
                <!-- ID строки нужен, чтобы HTMX понимал, что удалять -->
                <tr class="verbgroup-row">
                    <td class="ps-4 fw-bold">{{ group.title }}</td>
                    <td><span class="badge bg-light text-dark border">{{ group.course.title }}</span></td>
                    <td class="text-center">
                        <span class="badge rounded-pill bg-primary">{{ group.verbs.count }}</span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group">
                            <!-- Кнопка редактирования (обычная ссылка) -->
                            <a href="{% url 'web-verbgroup-edit' group.id %}" class="btn btn-sm btn-link text-decoration-none">
                                📝
                            </a>

                            <!-- Кнопка удаления (HTMX) -->
                            <button class="btn btn-sm btn-link text-decoration-none"
                                    hx-delete="{% url 'web-verbgroup-delete' group.id %}"
                                    hx-confirm="{% blocktrans %}Möchten Sie den Wortschatz '{{ group.title }}' wirklich löschen?{% endblocktrans %}"
                                    hx-target="closest .verbgroup-row"
                                    hx-swap="outerHTML">
                                ❌
                            </button>
                        </div>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center py-4 text-muted">
                        {% trans "Keine Wortschätze vorhanden." %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
