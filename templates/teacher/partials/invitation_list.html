<div class="card border-0 shadow-sm overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">Email</th>
                    <th>Код</th>
                    <th class="text-center">Статус</th>
                    <th class="text-end pe-4">Дата создания</th>
                </tr>
            </thead>
            <tbody>
                {% for invite in invitations %}
                <tr>
                    <td class="ps-4 fw-bold">{{ invite.email }}</td>
                    <td><code class="bg-light p-1 rounded">{{ invite.code }}</code></td>
                    <td class="text-center">
                        {% if invite.is_used %}
                            <span class="badge bg-success">Использован</span>
                        {% else %}
                            <span class="badge bg-warning text-dark">Ожидает</span>
                        {% endif %}
                    </td>
                    <td class="text-end pe-4 text-muted small">
                        {{ invite.created_at|date:"d.m.Y H:i" }}
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center py-4 text-muted">
                        Вы еще не создавали приглашений.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
