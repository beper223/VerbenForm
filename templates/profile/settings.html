{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="fw-bold mb-4">Настройки профиля</h3>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    <a href="{% url 'units-list' %}" class="btn btn-link text-muted">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
