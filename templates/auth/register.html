{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <h2 class="text-center mb-4">Registrierung</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-success w-100 btn-lg mt-3">Создать аккаунт</button>
            </form>
            <p class="mt-3 text-center small text-muted">
                Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
