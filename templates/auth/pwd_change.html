{% extends 'base.html' %}
{% load i18n crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow border-0">
            <h2 class="text-center fw-bold mb-4">{% trans "Passwort ändern" %}</h2>

            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}

                {% include 'includes/_password_toggle.html' %}

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100 btn-lg mb-2">
                        {% trans "Passwort speichern" %}
                    </button>

                    <a href="{% url 'web-profile' %}" class="btn btn-outline-secondary w-100">
                        {% trans "Abbrechen" %}
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
