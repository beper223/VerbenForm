{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <h2 class="text-center mb-4">Anmelden</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="togglePassword">
                    <label class="form-check-label" for="togglePassword small">Пароль видно</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">Войти</button>
            </form>
            <p class="mt-3 text-center">Нет аккаунта? <a href="{% url 'register' %}">Регистрация</a></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('change', function() {
        const passwordInput = document.querySelector('input[type="password"], input[type="text"][name="password"]');
        // В Django crispy-forms пароль обычно имеет id_password
        const passField = document.getElementById('id_password');
        passField.type = this.checked ? 'text' : 'password';
    });
</script>
{% endblock %}
