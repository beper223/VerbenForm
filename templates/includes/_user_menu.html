{% if user.is_authenticated %}
    <li class="nav-item"><a class="nav-link" href="{% url 'units-list' %}">Dashboard</a></li>
    {% if user.is_teacher_admin %}
        <li class="nav-item"><a class="nav-link" href="{% url 'web-teacher-dashboard' %}">Lehrer-Panel</a></li>
    {% endif %}

    <li class="nav-item">
        <a class="nav-link px-2" href="{% url 'web-profile' %}" title="Profil">
            <i class="bi bi-person-circle fs-4"></i>
            <span class="d-lg-none ms-2">{{ user.display_name }}</span>
        </a>
    </li>
    <li class="nav-item">
        <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="nav-link btn btn-link border-0 py-0 px-2" title="Abmelden">
                <i class="bi bi-box-arrow-right fs-4"></i>
                <span class="d-lg-none ms-2">Abmelden</span>
            </button>
        </form>
    </li>
{% else %}
    <li class="nav-item"><a class="nav-link fw-bold" href="{% url 'login' %}">Anmelden</a></li>
    <li class="nav-item"><a class="btn btn-outline-light ms-lg-2" href="{% url 'register' %}">Registrieren</a></li>
{% endif %}
