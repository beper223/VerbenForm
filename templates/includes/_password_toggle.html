{#Этот файл теперь будет искать все поля паролей на странице.#}
{% load i18n %}
<div class="form-check mb-3 password-toggle-wrapper">
    <input class="form-check-input" type="checkbox" id="togglePassword">
    <label class="form-check-label small text-muted" for="togglePassword">
        {% trans "Passwort anzeigen" %}
    </label>
</div>

<script>
    (function() {
        const toggle = document.getElementById('togglePassword');
        if (toggle) {
            toggle.addEventListener('change', function() {
                // Находим все инпуты, которые имеют тип password или были им раньше
                const fields = document.querySelectorAll('input[type="password"], input[data-is-password="true"]');
                fields.forEach(f => {
                    f.setAttribute('data-is-password', 'true'); // Помечаем поле
                    f.type = this.checked ? 'text' : 'password';
                });
            });
        }
    })();
</script>
