
################################
# LOG FORMAT
################################

log-format COMBINED
date-format %d/%b/%Y
time-format %H:%M:%S

################################
# INPUT LOG
################################

log-file /opt/goaccess/logs/access.log

################################
# OUTPUT
################################

output /opt/goaccess/out/stats.html

################################
# REAL TIME HTML
################################

real-time-html true
addr 0.0.0.0
port 7890

# WebSocket URL (через nginx)
ws-url wss://deutsch-core.de:443/ws

################################
# DATABASE (чтобы статистика не сбрасывалась)
################################

persist true
restore true
db-path /opt/goaccess/db

################################
# GEOLOCATION
################################

geoip-database /opt/goaccess/geoip/GeoLite2-City.mmdb

################################
# IGNORE
################################

# игнорировать внутренние IP
ignore-ip 127.0.0.1
ignore-ip ::1

# игнорировать ботов
ignore-crawlers true

################################
# UI SETTINGS
################################

# количество строк в таблицах
max-items 50

# тема интерфейса
html-prefs {"theme":"dark"}

################################
# HEADERS
################################

# если nginx работает как reverse proxy
real-ip-header X-Forwarded-For

################################
# PANELS
################################

# можно отключать панели
#ignore-panel KEYPHRASES
#ignore-panel OS
#ignore-panel BROWSERS