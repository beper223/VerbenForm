# nginx.conf
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name deutsch-core.de www.deutsch-core.de;

    # Папка со статикой, монтированная из Docker volume
    location /static/ {
        alias /app/staticfiles/;  # путь к volume в контейнере nginx
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Медиа (если есть, например uploaded файлы)
    # location /media/ {
    #     alias /usr/share/nginx/html/media/;
    #     expires 30d;
    #     add_header Cache-Control "public, max-age=2592000";
    # }

    # Все остальные запросы проксируем на Gunicorn
    location / {
        proxy_pass http://web:8000;  # web — имя сервиса в docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: увеличить размер тела запроса (для file upload)
#     client_max_body_size 20M;

    # Optional: логирование
#     access_log /var/log/nginx/access.log;
#     error_log /var/log/nginx/error.log;
}

# Настройки HTTPS
server {
    listen 443 ssl;
    server_name deutsch-core.de www.deutsch-core.de;

    # Пути к сертификатам (теперь они внутри контейнера)
    ssl_certificate /etc/letsencrypt/live/deutsch-core.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deutsch-core.de/privkey.pem;

    # Оптимизация безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Логирование (важно для GoAccess)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # СТАТИСТИКА
    location /stats.html {
        alias /app/report/stats.html;
        auth_basic "Restricted Area";            # Текст в окне пароля
        auth_basic_user_file /etc/nginx/.htpasswd; # Путь к файлу с паролем
    }

    # Настройка для WebSocket GoAccess
    location /ws {

        auth_basic off;
        proxy_set_header Authorization "";

        proxy_pass http://goaccess:7890;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_read_timeout 7d;
    }

    # Статика
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
    }

    # Проксирование на Django (Gunicorn)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
